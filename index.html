<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="page-wrapper">
      <article class="card" id="todo-card" data-testid="test-todo-card">

        <div class="card-header">
          <div class="checkbox-wrap">
            <input
              type="checkbox"
              id="complete-toggle"
              data-testid="test-todo-complete-toggle"
              aria-label="Mark task as complete"
            />
          </div>
          <div class="card-title-group">
            <h2 data-testid="test-todo-title" id="task-title">
              Design the Homepage Wireframes
            </h2>
            <p data-testid="test-todo-description">
              Create wireframes for the landing page before the sprint ends.
            </p>
          </div>
        </div>

        <div class="meta-row">
          <span class="badge badge-high" data-testid="test-todo-priority">High</span>
          <span class="badge badge-status" data-testid="test-todo-status" id="status-badge">In Progress</span>
        </div>

        <div class="divider"></div>

        <div class="date-row">
          <time class="due-date" data-testid="test-todo-due-date">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <rect x="1" y="3" width="14" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/>
              <path d="M5 1v4M11 1v4M1 7h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            Due Apr 20, 2026
          </time>
          <span class="time-remaining" data-testid="test-todo-time-remaining" id="time-remaining">
            Calculating...
          </span>
        </div>

        <ul class="tags-list" data-testid="test-todo-tags" role="list">
          <li data-testid="test-todo-tag-work">Work</li>
          <li data-testid="test-todo-tag-urgent">Urgent</li>
        </ul>

        <div class="action-row">
          <button class="btn btn-edit" data-testid="test-todo-edit-button">Edit</button>
          <button class="btn btn-delete" data-testid="test-todo-delete-button">Delete</button>
        </div>

      </article>
    </div>
    <script src="script.js"></script>
  </body>
</html>
